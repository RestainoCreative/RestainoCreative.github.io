# Pages CMS configuration — defines the no-code admin at app.pagescms.org
# Uploaded images/videos go to /media. Content lives in /content as JSON,
# which the site reads at runtime.

media:
  input: media
  output: /media
  extensions: [jpg, jpeg, png, gif, webp, svg, mp4, webm, mov]

content:
  # ── About page content ──
  - name: about
    label: "About Page"
    type: file
    path: content/about.json
    fields:
      - { name: eyebrow,    label: "Eyebrow", type: string }
      - { name: name,       label: "Name", type: string }
      - { name: descriptor, label: "Descriptor line", type: string }
      - { name: portrait,   label: "Portrait photo", type: image }
      - { name: bio,        label: "Bio (intro statement)", type: text }
      - { name: highlights, label: "Highlight chips", type: string, list: true }
      - { name: philosophy, label: "Philosophy", type: text }
      - { name: mission,    label: "Mission", type: text }
      - { name: wideImage,  label: "Wide feature photo", type: image }
      - { name: sideImage,  label: "Off-the-clock photo", type: image }
      - { name: funFacts,   label: "Fun facts", type: text, list: true }
      - { name: email,      label: "Email", type: string }

  # ── Home page content ──
  - name: home
    label: "Home Page"
    type: file
    path: content/home.json
    fields:
      - name: hero
        label: Hero reel
        type: object
        fields:
          - { name: video,  label: "Hero video", type: file }
          - { name: poster, label: "Poster image (fallback frame)", type: image }
      - name: statement
        label: "Statement cards (intro sequence)"
        type: object
        list: true
        fields:
          - { name: text,      label: "Text", type: text }
          - { name: textRight, label: "Right-side text (split card only)", type: text }
          - { name: image,     label: "Background image", type: image }
          - { name: align,     label: "Alignment", type: select, options: { values: [left, center, right, split] } }
      - name: numbers
        label: "By the Numbers"
        type: object
        fields:
          - { name: roleLines, label: "Intro role lines", type: string, list: true }
          - name: metrics
            label: Metrics
            type: object
            list: true
            fields:
              - { name: value,  label: "Number", type: number }
              - { name: suffix, label: "Suffix (e.g. M+, K)", type: string }
              - { name: label,  label: "Label", type: string }
              - { name: body,   label: "Caption", type: text }
              - { name: style,  label: "Emphasis", type: select, options: { values: [normal, hero, accent] } }
      - name: whatIDo
        label: "What I Do"
        type: object
        fields:
          - { name: title, label: "Section title", type: string }
          - name: items
            label: Disciplines
            type: object
            list: true
            fields:
              - { name: n,     label: "Number (e.g. 01)", type: string }
              - { name: title, label: "Title", type: string }
              - { name: body,  label: "Description", type: text }
      - name: contact
        label: "Contact"
        type: object
        fields:
          - { name: email,    label: "Email", type: string }
          - { name: location, label: "Location (one line per row)", type: text }
          - name: socials
            label: Social links
            type: object
            list: true
            fields:
              - { name: label, label: "Label", type: string }
              - { name: url,   label: "URL", type: string }
      - name: brandLogos
        label: "Companies I've worked with (logos)"
        type: object
        list: true
        fields:
          - { name: image, label: "Logo image", type: image }
          - { name: name,  label: "Company name (for accessibility)", type: string }

  # ── Work index: the order + cards of the stacked reel on /work ──
  - name: work
    label: "Work — Reel order"
    type: file
    path: content/work.json
    fields:
      - name: projects
        label: Projects (in reel order)
        type: object
        list: true
        fields:
          - { name: num,    label: "Number (e.g. 01)", type: string }
          - { name: slug,   label: "Slug — must match a Case Study file name", type: string }
          - { name: title,  label: Title,  type: string }
          - { name: client, label: Client, type: string }
          - { name: year,   label: Year,   type: number }
          - { name: tags,   label: Tags,   type: string, list: true }
          - name: media
            label: Card media
            type: object
            fields:
              - { name: type,   label: Type, type: select, options: { values: [image, video] } }
              - { name: src,    label: "Image or video", type: file }
              - { name: poster, label: "Poster image (for video)", type: image }

  # ── Case studies: one file per project. Add a project = add an entry. ──
  - name: projects
    label: "Case Studies"
    type: collection
    path: content/projects
    filename: "{fields.slug}.json"
    view:
      fields: [title, tagline]
    fields:
      - { name: slug,    label: "Slug (URL id, e.g. phish-at-sphere)", type: string }
      - { name: title,   label: Title,   type: string }
      - { name: tagline, label: Tagline, type: string }
      - { name: tags,    label: Tags,    type: string, list: true }

      - name: hero
        label: Hero media (full-screen top)
        type: object
        fields:
          - { name: type,   label: Type, type: select, options: { values: [image, video] } }
          - { name: src,    label: "Image or video", type: file }
          - { name: poster, label: "Poster image (for video)", type: image }

      - name: facts
        label: Facts bar
        type: object
        list: true
        fields:
          - { name: k, label: Label, type: string }
          - { name: v, label: Value, type: string }

      - name: challenge
        label: The Challenge
        type: object
        fields:
          - { name: body, label: Paragraphs, type: text, list: true }
          - name: media
            label: Background image
            type: object
            fields:
              - { name: type, label: Type, type: select, options: { values: [image, video] } }
              - { name: src,  label: "Image or video", type: file }

      - name: feature
        label: Feature moment (full-screen)
        type: object
        fields:
          - { name: type,    label: Type, type: select, options: { values: [image, video] } }
          - { name: src,     label: "Image or video", type: file }
          - { name: poster,  label: "Poster image (for video)", type: image }
          - { name: caption, label: Caption, type: string }

      - name: approach
        label: The Approach
        type: object
        fields:
          - { name: body, label: Paragraphs, type: text, list: true }
          - { name: led,  label: "What I led (bullet list)", type: text, list: true }

      - name: gallery
        label: Selected work (sideways gallery)
        type: object
        list: true
        fields:
          - { name: type,    label: Type, type: select, options: { values: [image, video] } }
          - { name: src,     label: "Image or video", type: file }
          - { name: poster,  label: "Poster image (for video)", type: image }
          - { name: caption, label: Caption, type: string }

      - name: impact
        label: The Impact
        type: object
        fields:
          - name: metrics
            label: Metrics
            type: object
            list: true
            fields:
              - { name: n,      label: "Number (e.g. 80)", type: string }
              - { name: suffix, label: "Suffix (e.g. K, M+)", type: string }
              - { name: k,      label: Label, type: string }
          - { name: note, label: Outcome note, type: text }

      - name: credits
        label: Credits
        type: object
        list: true
        fields:
          - { name: k, label: Role, type: string }
          - { name: v, label: Name, type: string }

      - name: next
        label: "Next project teaser"
        type: object
        fields:
          - { name: slug,    label: "Slug of next project", type: string }
          - { name: title,   label: Title, type: string }
          - { name: tagline, label: Tagline, type: string }
          - name: media
            label: Teaser media
            type: object
            fields:
              - { name: type, label: Type, type: select, options: { values: [image, video] } }
              - { name: src,  label: "Image or video", type: file }
